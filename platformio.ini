; PlatformIO Project Configuration File
;
; WiFi Security Monitor — passive 802.11 anomaly detector
; Target: ESP8266 (NodeMCU v2 / Wemos D1 Mini compatible)
;
; This project is RECEIVE-ONLY: it puts the radio into promiscuous
; (monitor) mode to observe management frames and never transmits
; deauthentication, disassociation, or spoofed beacon frames.

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
build_flags =
    -D DEBUG_ESP_PORT=Serial
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_HIGHER_BANDWIDTH

; If you're using a Wemos D1 Mini instead, swap the board line above for:
; board = d1_mini
